services:
  - type: web
    name: instclone-api
    runtime: node
    plan: free
    branch: main
    buildCommand: cd Backend && npm ci
    startCommand: cd Backend && node server.js
    healthCheckPath: /
    autoDeploy: true
    buildFilter:
      paths:
        - Backend/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: CLIENT_ORIGINS
        fromService:
          name: instclone-web
          type: web
          property: host
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false

  - type: web
    name: instclone-web
    runtime: static
    plan: free
    branch: main
    buildCommand: cd Frontend && npm ci && npm run build
    staticPublishPath: Frontend/dist
    autoDeploy: true
    buildFilter:
      paths:
        - Frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: instclone-api
          type: web
          property: host
