services:
  - type: web
    name: connectverse-live
    runtime: node
    repo: https://github.com/callmeazee/InstClone
    plan: free
    branch: main
    buildCommand: cd Backend && npm ci && cd ../Frontend && npm ci && npm run build
    startCommand: cd Backend && npm start
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - Backend/**
        - Frontend/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
